[SERVICE]
    Flush         1
    Daemon        off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*-json.log
    Parser            docker
    Read_from_head    True
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     50MB

[FILTER]
    Name    modify
    Match   docker.*
    Add     source docker
    Add     environment production

[OUTPUT]
    Name                gelf
    Match               docker.*
    Host                graylog
    Port                12201
    Mode                udp
    Gelf_Short_Message_Key log
    Gelf_Host_Key       hostname
